---
exclude_paths:
  - config
  - db
  - spec
  - vendor

detectors:
  IrresponsibleModule:
    enabled: false
  UtilityFunction:
    enabled: false
  ControlParameter:
    enabled: false
  BooleanParameter:
    enabled: false
  FeatureEnvy:
    enabled: false
  TooManyStatements:
    enabled: false
  DuplicateMethodCall:
    enabled: false
  LongParameterList:
    enabled: false
  RepeatedConditional:
    enabled: false
  DataClump:
    enabled: false
  ManualDispatch:
    enabled: false
  MissingSafeMethod:
    enabled: false
  NilCheck:
    enabled: false
  UncommunicativeVariableName:
    enabled: false
