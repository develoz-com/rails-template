plugins:
  - rubocop-capybara
  - rubocop-migration
  - rubocop-factory_bot
  - rubocop-performance
  - rubocop-rails
  - rubocop-rspec
  - rubocop-rspec_rails

require:
  - rubocop-rubycw

AllCops:
  TargetRubyVersion: 3.4
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "bin/**/*"
    - "exe/**/*"
    - "vendor/**/*"
    - ".git/**/*"
    - "config/**/*"
    - "spec/fixtures/canonical/**/*"

# Gem-specific relaxations
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Metrics/ClassLength:
  Exclude:
    - "lib/develoz/generators/base.rb"

Metrics/MethodLength:
  Max: 20
  Exclude:
    - "lib/develoz/generators/base.rb"

Metrics/AbcSize:
  Exclude:
    - "lib/develoz/generators/base.rb"

Metrics/CyclomaticComplexity:
  Exclude:
    - "lib/develoz/generators/base.rb"

Metrics/PerceivedComplexity:
  Exclude:
    - "lib/develoz/generators/base.rb"

Metrics/BlockNesting:
  Exclude:
    - "lib/develoz/generators/base.rb"

Layout/LineLength:
  Exclude:
    - "lib/develoz/generators/base.rb"

RSpec/ExampleLength:
  Max: 15

RSpec/MultipleExpectations:
  Max: 3

# CLI/generator gem legitimately writes to stdout; puts/say is the interface
Rails/Output:
  Enabled: false

# Development dependencies intentionally declared in gemspec per gem best practices
Gemspec/DevelopmentDependencies:
  Enabled: false

# Many small classes across generators; top-level doc comments add noise
Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

Rails/RakeEnvironment:
  Exclude:
    - "Rakefile"

Layout/SpaceInsideArrayLiteralBrackets:
  EnforcedStyle: no_space

Style/SymbolArray:
  EnforcedStyle: percent

Style/WordArray:
  EnforcedStyle: percent
